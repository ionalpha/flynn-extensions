version: 2

project_name: flynn-extensions

before:
  hooks:
    - go mod tidy

# One build entry per extension under cmd/. Each produces its own binary across the full
# os/arch matrix, so an extension ships as a standalone artifact a host downloads for its
# platform. Add a new entry here when a new cmd/<ext> is added; nothing else changes.
builds:
  - id: example
    main: ./cmd/example
    binary: example
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{ .Version }}

# One archive per extension binary per platform, named by the binary so a release lists
# each extension's artifacts unambiguously. Windows ships a zip; the rest ship tar.gz.
archives:
  - formats: [tar.gz]
    name_template: "{{ .Binary }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

sboms:
  - artifacts: archive

# Keyless signature over the checksum file via cosign + Sigstore (OIDC in CI). The
# detached .sig and .pem let a downloader verify the checksums, and so every artifact
# they cover, against the release workflow's identity with no long-lived key to manage.
signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    signature: "${artifact}.sig"
    args:
      - sign-blob
      - "--yes"
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
    artifacts: checksum
    output: true

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Other changes
      order: 999
  filters:
    exclude:
      - '^docs(\(.+\))?:'
      - '^test(\(.+\))?:'
      - '^style(\(.+\))?:'
      - '^chore(\(.+\))?:'
      - '^ci(\(.+\))?:'
      - '^build(\(.+\))?:'
      - '^Merge pull request'
      - '^Merge branch'

release:
  draft: false
  prerelease: auto
