name: Release

# One extension, on its own timeline. The tag names it: "token/v0.1.0" releases the token
# extension and nothing else. The job lives in ionalpha/go-ci so every ionalpha repo that
# ships binaries releases them the same way, and the rules cannot drift between repos.
on:
  push:
    tags: ["*/v*"] # <extension>/vX.Y.Z

permissions:
  contents: read

jobs:
  release:
    uses: ionalpha/go-ci/.github/workflows/monorepo-release.yml@main
    permissions:
      contents: write # create the release and upload its assets
      id-token: write # keyless cosign signing via OIDC
      attestations: write # SLSA build provenance
    with:
      # Pinned to the same ref as the workflow above, so the release tool and the workflow
      # that runs it move together.
      ci-ref: main
