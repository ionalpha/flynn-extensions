name: OpenSSF Scorecard

# Thin caller: the analysis lives once in ionalpha/go-ci.
on:
  branch_protection_rule:
  schedule:
    - cron: "21 4 * * 2"
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write
  id-token: write

jobs:
  scorecard:
    uses: ionalpha/go-ci/.github/workflows/scorecard.yml@main
