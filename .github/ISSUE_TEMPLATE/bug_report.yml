name: Bug report
description: Report a problem with a flynn extension
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please search existing issues first, and read AGENTS.md.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal, exact steps. A failing test or command is ideal.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Extension name and version (and flynn version if relevant).
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / arch
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      render: shell
